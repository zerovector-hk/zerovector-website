<svg viewBox="0 0 500 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ThreatLedger">
  <defs>
    <linearGradient id="spineRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Ledger book icon -->
  <!-- Book body -->
  <rect x="8" y="8" width="74" height="94" rx="6" fill="url(#pageBg)" stroke="#2d2d4e" stroke-width="1"/>
  <!-- Red spine (threat indicator) -->
  <rect x="8" y="8" width="13" height="94" rx="5" fill="url(#spineRed)"/>

  <!-- Chain links on spine -->
  <ellipse cx="14.5" cy="38" rx="4" ry="3" fill="none" stroke="#fca5a5" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="14.5" cy="52" rx="4" ry="3" fill="none" stroke="#fca5a5" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="14.5" cy="66" rx="4" ry="3" fill="none" stroke="#fca5a5" stroke-width="1.2" opacity="0.7"/>
  <!-- Connecting dots between chain links -->
  <line x1="14.5" y1="41" x2="14.5" y2="49" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <line x1="14.5" y1="55" x2="14.5" y2="63" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>

  <!-- Ledger rows (amber/gold) -->
  <rect x="27" y="27" width="48" height="2" rx="1" fill="#fbbf24" opacity="0.9"/>
  <rect x="27" y="43" width="48" height="1.5" rx="1" fill="#fbbf24" opacity="0.5"/>
  <rect x="27" y="58" width="48" height="2" rx="1" fill="#fbbf24" opacity="0.9"/>
  <rect x="27" y="73" width="48" height="1.5" rx="1" fill="#fbbf24" opacity="0.5"/>
  <rect x="27" y="88" width="28" height="1.5" rx="1" fill="#fbbf24" opacity="0.3"/>

  <!-- Threat alert dots (red) -->
  <circle cx="69" cy="28" r="6" fill="#ef4444"/>
  <circle cx="69" cy="59" r="6" fill="#ef4444"/>
  <text x="69" y="32" fill="white" font-size="8" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">!</text>
  <text x="69" y="63" fill="white" font-size="8" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">!</text>

  <!-- Wordmark -->
  <text x="97" y="62"
        font-family="'Space Grotesk', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="800" letter-spacing="-1"
        fill="#f9fafb">Threat<tspan fill="#ef4444">Ledger</tspan></text>

  <!-- Chinese subtitle -->
  <text x="99" y="84"
        font-family="'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif"
        font-size="12" fill="#6b7280" letter-spacing="5">威 脅 帳 本</text>
</svg>
