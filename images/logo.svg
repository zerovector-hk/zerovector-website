<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#040c18"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#1a6cf6"/>
    </linearGradient>
  </defs>

  <!-- Dark square badge, rounded corners -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- Blue border -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22"
        fill="none" stroke="url(#blueGrad)" stroke-width="3" opacity="0.7"/>

  <!--
    Z constructed from 3 solid parallelogram/trapezoid shapes
    giving it weight and a "block letter" feel
  -->

  <!-- Top bar of Z (blue, left-to-right) -->
  <rect x="22" y="22" width="56" height="11" rx="5" fill="url(#blueGrad)"/>

  <!-- Diagonal of Z (white, top-right to bottom-left) -->
  <!-- Using a rotated rect via polygon -->
  <polygon points="65,33  74,33  35,67  26,67" fill="white" opacity="0.95"/>

  <!-- Bottom bar of Z (blue, left-to-right) -->
  <rect x="22" y="67" width="56" height="11" rx="5" fill="url(#blueGrad)"/>

  <!-- Arrow head at top-right corner (vector accent) -->
  <circle cx="75" cy="27" r="7" fill="#00d4ff"/>
  <circle cx="75" cy="27" r="3.5" fill="white"/>
</svg>
