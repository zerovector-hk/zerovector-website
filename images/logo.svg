<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon (Web3 / blockchain) -->
  <polygon points="50,4 93,28 93,72 50,96 7,72 7,28"
           stroke="url(#g1)" stroke-width="4.5" fill="none" stroke-linejoin="round"/>

  <!-- Letter Z — top bar, diagonal, bottom bar -->
  <!-- Top bar: left to right -->
  <line x1="28" y1="34" x2="60" y2="34" stroke="#00d4ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Diagonal: top-right to bottom-left -->
  <line x1="60" y1="34" x2="28" y2="66" stroke="#00d4ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Bottom bar: left to right -->
  <line x1="28" y1="66" x2="60" y2="66" stroke="#00d4ff" stroke-width="7" stroke-linecap="round"/>

  <!-- Arrow head pointing up-right from bottom-right corner of Z -->
  <!-- Vertical stem -->
  <line x1="66" y1="66" x2="66" y2="34" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Arrow tip pointing up -->
  <polyline points="56,44 66,34 76,44" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
</svg>
