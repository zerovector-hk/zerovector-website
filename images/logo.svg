<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" fill="none">
  <defs>
    <linearGradient id="zv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#1a6cf6"/>
    </linearGradient>
  </defs>

  <!--
    ZV Wordmark — geometric, Ledger/Fireblocks minimal style
    Z: three bold strokes with slashed diagonal (vector/lightning feel)
    V: sharp convergence, shares visual weight
    Transparent background
  -->

  <!-- Z -->
  <!-- Top bar -->
  <polygon points="4,6  52,6  52,14  18,14" fill="url(#zv)"/>
  <!-- Diagonal slash (skewed — lightning/vector feel) -->
  <polygon points="44,12  52,12  16,48  8,48" fill="white" opacity="0.92"/>
  <!-- Bottom bar -->
  <polygon points="4,46  52,46  38,54  4,54" fill="url(#zv)"/>

  <!-- V -->
  <!-- Left arm -->
  <polygon points="62,6  72,6  80,46  70,46" fill="url(#zv)"/>
  <!-- Right arm -->
  <polygon points="104,6  114,6  88,46  78,46" fill="white" opacity="0.92"/>
  <!-- Tip accent -->
  <circle cx="84" cy="50" r="4" fill="#00d4ff"/>
</svg>
